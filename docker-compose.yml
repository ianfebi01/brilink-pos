version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brilink-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brilink
    ports:
      - "5432:5432"
    volumes:
      - brilink_pgdata:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brilink-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:password@db:5432/brilink?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=brilink-super-secret-key-for-development
    depends_on:
      - db
    restart: always

volumes:
  brilink_pgdata:
